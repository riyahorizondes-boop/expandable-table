<div class="wrapper">

  <!-- SELECTION BAR -->
  <div class="selection-bar" *ngIf="selectedCount > 0">
    <div class="sel-left">
      <div class="sel-badge">
        <span class="material-symbols-outlined">check_circle</span>
        {{ selectedCount }} row(s) selected
      </div>
      <button class="sel-clear" (click)="clearSelection()">Clear</button>
    </div>
    <div class="sel-actions">
      <button class="icon-action"><span class="material-symbols-outlined">delete</span></button>
      <button class="icon-action"><span class="material-symbols-outlined">archive</span></button>
      <button class="icon-action"><span class="material-symbols-outlined">edit</span></button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" /></th>
          <th class="col-arrow"></th>
          <th>Node ID</th>
          <th>Source Path</th>
          <th>Resource Status</th>
          <th>Load Metric</th>
          <th class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngFor="let row of data">

          <!-- PARENT ROW -->
          <tr class="parent-row"
              [class.selected]="isSelected(row.id)"
              (click)="toggleSelect(row.id, $event)">
            <td class="col-check" (click)="toggleSelect(row.id, $event)">
              <input type="checkbox"
                [checked]="isSelected(row.id)"
                (click)="toggleSelect(row.id, $event)" />
            </td>
            <td class="col-arrow" (click)="toggleExpand(row.id, $event)">
              <span class="material-symbols-outlined expand-arrow"
                [class.rotated]="isExpanded(row.id)"
                *ngIf="row.children && row.children.length > 0">
                chevron_right
              </span>
            </td>
            <td class="node-id">{{ row.id }}</td>
            <td class="path-cell">{{ row.path }}</td>
            <td>
              <span class="badge" [ngClass]="getStatusClass(row.status)">
                {{ row.status }}
              </span>
            </td>
            <td class="load-cell">
              <div class="load-bar-bg">
                <div class="load-bar-fill"
                  [ngClass]="getLoadClass(row.load)"
                  [style.width.%]="row.load">
                </div>
              </div>
            </td>
            <td class="col-actions">
              <button class="more-btn">
                <span class="material-symbols-outlined">more_vert</span>
              </button>
            </td>
          </tr>

          <!-- CHILD ROWS -->
          <tr *ngIf="isExpanded(row.id) && row.children && row.children.length > 0">
            <td colspan="7" class="child-td">
              <div class="child-panel">
                <table class="child-table">
                  <tbody>
                    <tr *ngFor="let child of row.children"
                        class="child-row"
                        [class.selected]="isSelected(child.id)"
                        (click)="toggleSelect(child.id, $event)">
                      <td class="col-check">
                        <input type="checkbox"
                          [checked]="isSelected(child.id)"
                          (click)="toggleSelect(child.id, $event)" />
                      </td>
                      <td class="child-id">{{ child.id }}</td>
                      <td class="child-path">{{ child.path }}</td>
                      <td>
                        <span class="badge badge-sm" [ngClass]="getStatusClass(child.status)">
                          {{ child.status }}
                        </span>
                      </td>
                      <td class="child-actions">
                        <button class="view-btn">View</button>
                      </td>
                    </tr>
                  </tbo
